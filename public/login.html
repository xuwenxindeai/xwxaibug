<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIBug - 登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    .login-title { text-align: center; color: #667eea; margin-bottom: 30px; }
    .btn-login { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 12px; font-weight: 600; }
    .btn-login:hover { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); color: white; }
    .role-info { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; }
    .role-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-right: 5px; }
    .role-admin { background: #dc3545; color: white; }
    .role-developer { background: #0d6efd; color: white; }
    .role-tester { background: #198754; color: white; }
  </style>
</head>
<body>
  <div class="login-card">
    <h2 class="login-title">🔐 AIBug 登录</h2>
    <div class="mb-3">
      <label class="form-label">用户名</label>
      <input type="text" class="form-control" id="username" placeholder="admin / tester / developer" autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">密码</label>
      <input type="password" class="form-control" id="password" placeholder="admin123 / test123 / dev123">
    </div>
    <div class="mb-3">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="remember">
        <label class="form-check-label" for="remember">记住我（7 天）</label>
      </div>
    </div>
    <button class="btn btn-login w-100" onclick="login()">登 录</button>
    
    <div class="role-info">
      <small class="text-muted fw-bold">默认账户:</small><br>
      <span class="role-badge role-admin">管理员</span> admin / admin123<br>
      <span class="role-badge role-developer">开发</span> developer / dev123<br>
      <span class="role-badge role-tester">测试</span> tester / test123
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script>
    const token = localStorage.getItem('aibug_token');
    if (token) {
      $.ajax({
        url: '/api/auth/me',
        headers: { 'Authorization': 'Bearer ' + token },
        success: function(res) {
          if (res.success) window.location.href = '/dashboard.html';
        }
      });
    }

    function login() {
      const username = $('#username').val();
      const password = $('#password').val();
      const remember = $('#remember').is(':checked');
      if (!username || !password) { alert('请输入用户名和密码'); return; }

      $.ajax({
        url: '/api/auth/login',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ username, password }),
        success: function(res) {
          if (res.success) {
            localStorage.setItem('aibug_token', res.data.token);
            localStorage.setItem('aibug_user', JSON.stringify(res.data.user));
            if (remember) localStorage.setItem('aibug_remember', 'true');
            window.location.href = '/dashboard.html';
          } else {
            alert('登录失败：' + res.error);
          }
        },
        error: function() { alert('登录失败，请稍后重试'); }
      });
    }

    $(document).keypress(function(e) { if (e.which === 13) login(); });
  </script>
</body>
</html>
